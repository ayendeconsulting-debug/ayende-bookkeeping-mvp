<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Tempo Books</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3ef;color:#1a1814;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{background:#fff;border-radius:16px;padding:40px 32px;max-width:360px;width:100%;text-align:center;border:1px solid #e5e1d8}
  .logo{width:56px;height:56px;background:#0F6E56;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  .logo svg{width:30px;height:30px}
  h1{font-size:20px;font-weight:600;margin-bottom:8px;color:#1a1814}
  p{font-size:14px;color:#888070;line-height:1.6;margin-bottom:24px}
  button{background:#0F6E56;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
  button:hover{background:#085041}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 30 30" fill="none">
      <rect x="1" y="18" width="5" height="10" rx="1.5" fill="white" opacity=".5"/>
      <rect x="12" y="12" width="5" height="16" rx="1.5" fill="white" opacity=".75"/>
      <rect x="23" y="4" width="5" height="24" rx="1.5" fill="white"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>Tempo Books requires an internet connection to sync your transactions and reports. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</div>
</body>
</html>
